name: ${COMPOSE_PROJECT_NAME:-ppg-mqtt-system}

services:
  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 1883"]
      interval: 10s
      timeout: 3s
      retries: 5

  storage:
    build:
      context: ./storage
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_USERNAME: storage
      MQTT_PASSWORD: ${STORAGE_PASSWORD}
      SQLITE_PATH: ${SQLITE_PATH:-/data/ppg.sqlite3}
      TZ: ${TZ:-Asia/Jakarta}
    volumes:
      - ./data:/data

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-9100}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  mosquitto-data:
